name: Deploy Fly.io Apps

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-flyio-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  discover:
    name: Discover Apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      apps: ${{ steps.find-apps.outputs.apps }}
    steps:
      - uses: actions/checkout@v4

      - name: Find apps with fly.toml
        id: find-apps
        run: |
          set -euo pipefail
          apps=$(find . -name 'fly.toml' -not -path './.git/*' -print0 \
            | xargs -0 -r -I{} dirname "{}" \
            | sed 's|^\./||' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))')
          printf 'apps=%s\n' "$apps" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.app }}
    needs: discover
    if: ${{ needs.discover.outputs.apps != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJson(needs.discover.outputs.apps) }}
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Deploy ${{ matrix.app }}
        run: flyctl deploy --remote-only
        working-directory: ${{ matrix.app }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
